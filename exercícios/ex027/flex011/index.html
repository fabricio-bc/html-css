<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .conteiner{
           background-color: lightgreen;
           display: flex;
           flex-flow: row nowrap;
        }
        .item{
            background-color: lightsalmon;
            border: 1px solid black;
            flex-basis: 300px;
            text-align: center;
        }
        #a{
          flex-shrink: 10; 
          flex-grow: 1;
        }
        #b{
          flex-shrink: 1;
          flex-grow: 1;
        }
        #c{
          flex-shrink: 2;
          flex-grow: 10;
        }
    </style>
    <title>FlexBox</title>
</head>
<body>
    <div class="conteiner">
         <div class="item" id="a">A</div>
         <div class="item" id="b">B</div>
         <div class="item" id="c">C</div>
</body>
</html>
