<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
        .conteiner{
            border: 3px dashed red;
            display: grid;
            grid-template-rows: repeat(3,80px);
            grid-template-columns: 100px 40% repeat(2,1fr);
            grid-auto-flow: row;
            grid-auto-rows: 80px;
            grid-auto-columns: 120px;
            gap: 5px;
            place-items: normal normal;
            place-content: normal normal;
        }
        .item{
            border: 3px dashed blue;
            padding: 5px;
        }
    </style>
</head>
<body>
    <main class="conteiner">
        <section class="item">A</section>
        <section class="item">B</section>
        <section class="item">C</section>
        <section class="item">D</section>
        <section class="item">E</section>
        <section class="item">F</section>
        <section class="item">G</section>
        <section class="item">H</section>
        <section class="item">I</section>
        <section class="item">J</section>
    </main>
</body>
</html>
